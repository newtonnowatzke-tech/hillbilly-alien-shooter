# Publishes the browser game (web/) to GitHub Pages.
# Pure static deploy — NO Unity, NO account, NO secrets. Runs in seconds.
#
# ONE-TIME SETUP: repo Settings ▸ Pages ▸ Source → "GitHub Actions".
# After that, every push to main republishes automatically.
#
# Play URL: https://newtonnowatzke-tech.github.io/hillbilly-alien-shooter/

name: Deploy Web Game to Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload web/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
