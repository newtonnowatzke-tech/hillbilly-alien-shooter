# Helper for the ONE-TIME Unity license setup (only needed if you can't find
# a Unity_lic.ulf on your machine — see docs/WEBGL.md first).
#
# Run this workflow manually (Actions tab ▸ "Request Unity Activation File" ▸
# Run workflow), download the .alf artifact it produces, then:
#   1. Go to https://license.unity3d.com/manual
#   2. Upload the .alf, choose "Unity Personal", download the .ulf it gives you
#   3. Paste the .ulf file's full contents into a repo secret named UNITY_LICENSE

name: Request Unity Activation File

on:
  workflow_dispatch: {}

jobs:
  request-alf:
    name: Generate .alf activation file
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Request activation file
        id: request
        uses: game-ci/unity-request-activation-file@v2

      - name: Upload .alf artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: ${{ steps.request.outputs.filePath }}
