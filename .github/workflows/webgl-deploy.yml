# Builds the WebGL version with GameCI and publishes it to GitHub Pages.
#
# ONE-TIME SETUP REQUIRED (see docs/WEBGL.md for the full walkthrough):
#   1. Repo Settings ▸ Pages ▸ Source: "GitHub Actions"
#   2. Repo Settings ▸ Secrets and variables ▸ Actions ▸ New repository secret:
#        UNITY_LICENSE  — contents of your Unity_lic.ulf personal license file
#        UNITY_EMAIL    — your Unity account email
#        UNITY_PASSWORD — your Unity account password
#
# Play URL after the first successful run:
#   https://newtonnowatzke-tech.github.io/hillbilly-alien-shooter/

name: WebGL Build & Deploy (Unity — manual only)

# NOTE: The playable site now ships from the hand-built browser game via
# pages-deploy.yml (no Unity needed). This Unity WebGL pipeline is kept for
# folks who DO want the exact Unity build, but it's manual-only so it never
# competes with the static Pages deploy. Needs the Unity license secrets
# (see docs/WEBGL.md). Both target the same Pages site, so only run one.
on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: webgl-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build WebGL (Unity)
    runs-on: ubuntu-latest
    steps:
      - name: Check Unity license secrets
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          if [ -z "$UNITY_LICENSE" ]; then
            echo "::error::UNITY_LICENSE secret is not set. See docs/WEBGL.md for the one-time license setup."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: unity-library-webgl-${{ hashFiles('Packages/manifest.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            unity-library-webgl-

      - name: Build with GameCI
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL
          buildMethod: HillbillyAlienShooter.EditorTools.WebGLBuilder.BuildWebGL
          allowDirtyBuild: true

      # GameCI's dockerized editor writes the build as root; make it readable
      # for the artifact tar step.
      - name: Fix build permissions
        run: sudo chown -R "$(id -u):$(id -g)" build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/WebGL

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
